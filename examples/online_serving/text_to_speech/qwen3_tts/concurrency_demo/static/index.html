<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Qwen3-TTS Concurrency Race</title>
<style>
  :root {
    --brand: #4A90D9;
    --text: #1f2937;
    --muted: #6b7280;
    --line: #e5e7eb;
    --panel: #0b1220;
    --panel-line: #1f2937;
    --bg: #fafbfc;
    --chip-bg: #eef2f7;
    --serial: #f59e0b;
    --parallel: #22c55e;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; color: var(--text); background: var(--bg); }

  header { display: flex; align-items: center; gap: 16px; padding: 14px 24px; border-bottom: 1px solid var(--line); background: #fff; }
  header img { height: 42px; }
  header h1 { margin: 0; font-size: 1.5em; line-height: 1.2; }
  header .sub { font-size: 0.85em; color: var(--muted); margin-top: 2px; }
  header code { background: var(--chip-bg); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
  header a.brand { color: var(--brand); font-weight: 600; text-decoration: none; }
  header a.brand:hover { text-decoration: underline; }

  main { max-width: 1400px; margin: 0 auto; padding: 16px 24px 48px; }

  .banner {
    display: flex; align-items: stretch; gap: 12px; margin: 4px 0 18px;
    padding: 18px 24px; background: #fff; border: 1px solid var(--line); border-radius: 12px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .banner-cell { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .banner-cell .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
  .banner-cell .value { font-family: ui-monospace, SF Mono, monospace; font-size: 36px; font-weight: 700; line-height: 1; }
  .banner-cell.serial .value { color: var(--serial); }
  .banner-cell.parallel .value { color: var(--parallel); }
  .banner-cell.speedup { flex: 1.2; padding: 12px 18px; border-radius: 10px; background: linear-gradient(135deg, #eaf3fb, #ffffff); border: 1px solid var(--brand); }
  .banner-cell.speedup .value { color: var(--brand); font-size: 48px; }
  .banner-arrow { display: flex; align-items: center; color: #cbd5e1; font-size: 28px; }

  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--line); margin-bottom: 18px; }
  .tab { padding: 10px 18px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--muted); font-weight: 500; font-size: 14px; }
  .tab.active { border-bottom-color: var(--brand); color: var(--brand); font-weight: 600; }

  .page { display: none; }
  .page.active { display: block; }

  .lanes { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .lane { background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; }
  .lane-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 12px; }
  .lane-head .title { font-weight: 700; font-size: 14px; letter-spacing: 0.02em; }
  .lane-head .badge { font-family: ui-monospace, SF Mono, monospace; font-size: 11px; background: var(--chip-bg); padding: 3px 8px; border-radius: 999px; color: var(--muted); }
  .lane.serial .lane-head .title { color: var(--serial); }
  .lane.parallel .lane-head .title { color: var(--parallel); }
  .lane-elapsed { font-family: ui-monospace, SF Mono, monospace; font-size: 13px; color: var(--muted); }

  .row { display: flex; align-items: center; gap: 8px; font-family: ui-monospace, SF Mono, monospace; font-size: 11px; padding: 3px 0; }
  .row .label { width: 28px; color: var(--muted); text-align: right; }
  .row .wave-wrap { flex: 1; min-width: 0; }
  .row canvas { width: 100%; height: 36px; background: var(--panel); border-radius: 6px; display: block; }
  .row .ttfb, .row .rtf { width: 78px; color: var(--muted); }
  .row .status { width: 64px; font-weight: 600; }
  /* Audible-spotlight CSS removed; live audio playback is not wired up yet. */

  .counters { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 10px 0; }
  .counter { padding: 8px 10px; background: var(--panel); border-radius: 8px; color: #e5e7eb; font-family: ui-monospace, SF Mono, monospace; }
  .counter .clabel { color: #9ca3af; font-size: 10px; letter-spacing: 0.04em; }
  .counter .cvalue { font-size: 18px; font-weight: 600; margin-top: 2px; }

  .skyline { display: flex; align-items: flex-end; gap: 1px; height: 130px; padding: 6px; background: var(--panel); border-radius: 8px; box-shadow: inset 0 0 0 1px var(--panel-line); }
  .skyline .bar { flex: 1; border-radius: 1px 1px 0 0; transition: height 0.25s cubic-bezier(0.22,1,0.36,1), background 0.2s linear; min-height: 1px; }

  .milestones { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .milestone { font-family: ui-monospace, SF Mono, monospace; font-size: 11px; padding: 3px 9px; border-radius: 999px; background: var(--chip-bg); color: var(--muted); }
  .milestone.hit { background: var(--parallel); color: #fff; font-weight: 600; }

  .btn-row { display: flex; gap: 8px; margin-top: 18px; }
  .btn { padding: 10px 18px; border-radius: 6px; border: none; cursor: pointer; font-weight: 500; font-size: 14px; transition: filter 0.1s; }
  .btn:hover { filter: brightness(1.05); }
  .btn.primary { background: var(--brand); color: #fff; }
  .btn.secondary { background: var(--chip-bg); color: var(--text); }

  .status-line { font-size: 12px; color: var(--muted); margin-top: 6px; min-height: 16px; }
</style>
</head>
<body>
<header>
  <img src="https://raw.githubusercontent.com/vllm-project/vllm-omni/main/docs/source/logos/vllm-omni-logo.png" alt="vLLM-Omni">
  <div>
    <h1>Qwen3-TTS Concurrency Race</h1>
    <div class="sub">
      Served by <a class="brand" href="https://github.com/vllm-project/vllm-omni" target="_blank" rel="noopener">vLLM-Omni</a>
      &middot; serial <code id="api-serial">…</code>
      &middot; parallel <code id="api-parallel">…</code>
    </div>
  </div>
</header>

<main>
  <!-- Headline speedup banner -->
  <div class="banner">
    <div class="banner-cell serial">
      <div class="label">Serial elapsed</div>
      <div class="value" id="banner-serial">—</div>
    </div>
    <div class="banner-arrow">→</div>
    <div class="banner-cell parallel">
      <div class="label">Parallel elapsed</div>
      <div class="value" id="banner-parallel">—</div>
    </div>
    <div class="banner-arrow">→</div>
    <div class="banner-cell speedup">
      <div class="label">Speedup</div>
      <div class="value" id="banner-speedup">—</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="A">Page A — N=8</div>
    <div class="tab" data-tab="B">Page B — N=64</div>
  </div>

  <!-- Page A -->
  <section class="page active" id="pageA">
    <div class="lanes">
      <div class="lane serial">
        <div class="lane-head">
          <span class="title">SERIAL</span>
          <span class="badge">concurrency = 1</span>
          <span class="lane-elapsed" id="elapsed-A-serial">00.0 s</span>
        </div>
        <div id="rowsA-serial"></div>
      </div>
      <div class="lane parallel">
        <div class="lane-head">
          <span class="title">PARALLEL</span>
          <span class="badge">concurrency = 8</span>
          <span class="lane-elapsed" id="elapsed-A-parallel">00.0 s</span>
        </div>
        <div id="rowsA-parallel"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn primary" id="startA">▶ Start 8-stream race</button>
      <button class="btn secondary" id="resetA">Reset</button>
    </div>
    <div class="status-line" id="statusA"></div>
  </section>

  <!-- Page B -->
  <section class="page" id="pageB">
    <div class="lanes">
      <div class="lane serial">
        <div class="lane-head">
          <span class="title">SERIAL</span>
          <span class="badge">concurrency = 1</span>
          <span class="lane-elapsed" id="elapsed-B-serial">00.0 s</span>
        </div>
        <div class="counters" id="countersB-serial"></div>
        <div class="skyline" id="skylineB-serial"></div>
      </div>
      <div class="lane parallel">
        <div class="lane-head">
          <span class="title">PARALLEL</span>
          <span class="badge">concurrency = 64</span>
          <span class="lane-elapsed" id="elapsed-B-parallel">00.0 s</span>
        </div>
        <div class="counters" id="countersB-parallel"></div>
        <div class="skyline" id="skylineB-parallel"></div>
        <div class="milestones" id="milestonesB"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn primary" id="startB">▶ Start 64-stream race</button>
      <button class="btn secondary" id="resetB">Reset</button>
    </div>
    <div class="status-line" id="statusB"></div>
  </section>
</main>

<script>
(() => {
  const COLORS = { pending: '#9ca3af', streaming: '#4A90D9', done: '#22c55e', error: '#ef4444' };
  const GRID = { pending: '#1f2937', streaming: '#4A90D9', done: '#22c55e', error: '#ef4444' };
  const N = { A: 8, B: 64 };
  const WAVE_W = 320, WAVE_H = 36;
  const COUNTER_DEF = ['ACTIVE', 'DONE', 'TPUT', 'TTFB p99'];
  const MILESTONES = [8, 16, 32, 64];
  // Estimated full utterance length used to scale the waveform's x-axis.
  // Lets the polyline grow left->right as audio arrives, instead of always
  // rescaling to fill the strip; once audio_seconds >= this, the trace
  // covers the full width and starts compressing.
  const EXPECTED_AUDIO_S = 7.5;

  // Per-(page,lane,id) latched status. Once a stream reaches "done" or
  // "error" we never let the UI fall back to a lower-rung status. Without
  // this latch, an out-of-order SSE snapshot or a fresh connection that
  // re-reads aggregator state mid-tick can momentarily flip a green bar
  // back to blue, which the user (rightly) called out as wrong.
  const latched = {
    A: { serial: {}, parallel: {} },
    B: { serial: {}, parallel: {} },
  };
  function latchStatus(page, lane, id, incoming) {
    const prev = latched[page][lane][id];
    if (prev === 'done' || prev === 'error') return prev;
    latched[page][lane][id] = incoming;
    return incoming;
  }
  function resetLatch(page) {
    latched[page] = { serial: {}, parallel: {} };
  }

  // ---- Config ----
  fetch('/api/config').then(r => r.json()).then(cfg => {
    document.getElementById('api-serial').textContent = cfg.api_base_serial;
    document.getElementById('api-parallel').textContent = cfg.api_base_parallel;
  }).catch(() => {});

  // ---- Tabs ----
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('page' + tab.dataset.tab).classList.add('active');
    });
  });

  // ---- Build Page A rows (per lane) ----
  for (const lane of ['serial', 'parallel']) {
    const root = document.getElementById(`rowsA-${lane}`);
    for (let i = 0; i < N.A; i++) {
      const row = document.createElement('div');
      row.className = 'row';
      row.id = `row-A-${lane}-${i}`;
      row.innerHTML =
        `<span class="label">#${i + 1}</span>` +
        `<div class="wave-wrap"><canvas id="canvas-A-${lane}-${i}" width="${WAVE_W}" height="${WAVE_H}"></canvas></div>` +
        `<span class="ttfb" id="ttfb-A-${lane}-${i}">—</span>` +
        `<span class="rtf" id="rtf-A-${lane}-${i}">—</span>` +
        `<span class="status" id="status-A-${lane}-${i}" style="color:${COLORS.pending}">pending</span>`;
      root.appendChild(row);
    }
  }

  // ---- Build Page B skyline + counters (per lane) ----
  for (const lane of ['serial', 'parallel']) {
    const sky = document.getElementById(`skylineB-${lane}`);
    for (let i = 0; i < N.B; i++) {
      const bar = document.createElement('div');
      bar.className = 'bar';
      bar.id = `bar-B-${lane}-${i}`;
      bar.style.height = '0%';
      bar.style.background = GRID.pending;
      sky.appendChild(bar);
    }
    const counters = document.getElementById(`countersB-${lane}`);
    COUNTER_DEF.forEach((label, idx) => {
      const c = document.createElement('div');
      c.className = 'counter';
      c.innerHTML = `<div class="clabel">${label}</div><div class="cvalue" id="counter-B-${lane}-${idx}">—</div>`;
      counters.appendChild(c);
    });
  }
  // Milestones (parallel lane only)
  const mRoot = document.getElementById('milestonesB');
  MILESTONES.forEach(m => {
    const chip = document.createElement('span');
    chip.className = 'milestone';
    chip.id = `milestone-${m}`;
    chip.textContent = `${m} done`;
    mRoot.appendChild(chip);
  });

  // ---- Canvas waveform ----
  // Renders a filled min/max envelope. ``progress`` (0..1) controls how far
  // across the canvas the trace extends, so the line grows left-to-right as
  // audio arrives instead of rescaling to the full strip each tick. Once
  // progress >= 1, the envelope fills the whole width.
  function drawWave(canvas, samples, color, progress) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, WAVE_W, WAVE_H);
    ctx.strokeStyle = '#1f2937';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, WAVE_H / 2);
    ctx.lineTo(WAVE_W, WAVE_H / 2);
    ctx.stroke();
    if (!samples || samples.length === 0) return;
    const n = samples.length;
    const half = (WAVE_H / 2) - 2;
    const filled = Math.max(0.02, Math.min(1.0, progress || 1.0));
    const drawW = WAVE_W * filled;
    let peak = 0;
    for (let i = 0; i < n; i++) {
      const m = Math.max(Math.abs(samples[i][0]), Math.abs(samples[i][1]));
      if (m > peak) peak = m;
    }
    const scale = peak > 0.001 ? 0.92 / peak : 1.0;
    ctx.fillStyle = color + '55';
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const x = ((i + 0.5) / n) * drawW;
      const hi = Math.max(-1, Math.min(1, samples[i][1] * scale));
      const y = WAVE_H / 2 - hi * half;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    for (let i = n - 1; i >= 0; i--) {
      const x = ((i + 0.5) / n) * drawW;
      const lo = Math.max(-1, Math.min(1, samples[i][0] * scale));
      const y = WAVE_H / 2 - lo * half;
      ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Faint "playhead" tick where the trace currently ends, hinting at live progress.
    if (filled < 1.0) {
      ctx.strokeStyle = color + '88';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(drawW, WAVE_H / 2 - half);
      ctx.lineTo(drawW, WAVE_H / 2 + half);
      ctx.stroke();
    }
  }

  // ---- Format helpers ----
  function fmtSec(v) { return v == null ? '—' : (v < 10 ? v.toFixed(2) : v.toFixed(1)) + 's'; }
  function fmtMs(v) { return v == null ? '—' : Math.round(v) + ' ms'; }

  // ---- Render Page A from one lane snapshot ----
  function applyLaneA(lane, snap) {
    document.getElementById(`elapsed-A-${lane}`).textContent = fmtSec(snap.wall_s);
    for (let i = 0; i < N.A; i++) {
      const stream = snap.streams[i];
      const status = latchStatus('A', lane, i, stream.status);
      const progress = status === 'done' ? 1.0 : (stream.audio_seconds || 0) / EXPECTED_AUDIO_S;
      drawWave(document.getElementById(`canvas-A-${lane}-${i}`), stream.samples, COLORS[status], progress);
      document.getElementById(`ttfb-A-${lane}-${i}`).textContent = stream.ttfb_s != null ? `${Math.round(stream.ttfb_s * 1000)}ms` : '—';
      document.getElementById(`rtf-A-${lane}-${i}`).textContent = stream.final_rtf != null ? `RTF ${stream.final_rtf.toFixed(2)}` : '—';
      const s = document.getElementById(`status-A-${lane}-${i}`);
      s.textContent = status;
      s.style.color = COLORS[status];
    }
  }

  // ---- Render Page B from one lane snapshot ----
  function applyLaneB(lane, snap) {
    document.getElementById(`elapsed-B-${lane}`).textContent = fmtSec(snap.wall_s);
    document.getElementById(`counter-B-${lane}-0`).textContent = snap.active;
    document.getElementById(`counter-B-${lane}-1`).textContent = snap.completed;
    document.getElementById(`counter-B-${lane}-2`).textContent = (snap.throughput_x || 0).toFixed(1) + '×';
    document.getElementById(`counter-B-${lane}-3`).textContent = snap.ttfb_p99_ms != null ? Math.round(snap.ttfb_p99_ms) + 'ms' : '—';
    for (let i = 0; i < N.B; i++) {
      const stream = snap.streams[i];
      const status = latchStatus('B', lane, i, stream.status);
      const audio = stream.audio_seconds || 0;
      const pct = status === 'done' ? 100 : Math.min(99, Math.max(0, (audio / 7.0) * 100));
      const bar = document.getElementById(`bar-B-${lane}-${i}`);
      bar.style.height = pct.toFixed(1) + '%';
      bar.style.background = GRID[status];
    }
  }

  // ---- Render the combined banner ----
  function applyBanner(payload) {
    document.getElementById('banner-serial').textContent = fmtSec(payload.serial_eta_s);
    document.getElementById('banner-parallel').textContent = fmtSec(payload.parallel_eta_s);
    document.getElementById('banner-speedup').textContent = payload.speedup_x != null ? payload.speedup_x.toFixed(1) + '×' : '—';
  }

  // ---- Apply one full race snapshot ----
  function applyA(payload) {
    applyLaneA('serial', payload.serial);
    applyLaneA('parallel', payload.parallel);
    applyBanner(payload);
  }
  function applyB(payload) {
    applyLaneB('serial', payload.serial);
    applyLaneB('parallel', payload.parallel);
    applyBanner(payload);
    MILESTONES.forEach(m => {
      const chip = document.getElementById(`milestone-${m}`);
      if (payload.milestones && payload.milestones.includes(m)) chip.classList.add('hit');
      else chip.classList.remove('hit');
    });
  }

  // ---- SSE connection per page ----
  function connect(page, apply) {
    const es = new EventSource(`/api/race/${page}`);
    es.onmessage = (e) => {
      try { apply(JSON.parse(e.data)); }
      catch (err) { console.error('snapshot parse failed', err); }
    };
    es.onerror = () => {
      document.getElementById(`status${page}`).textContent = 'stream disconnected — retrying…';
    };
    return es;
  }
  connect('A', applyA);
  connect('B', applyB);

  // ---- Buttons ----
  function wireButtons(page) {
    document.getElementById(`start${page}`).addEventListener('click', async () => {
      resetLatch(page);
      const r = await fetch(`/api/start/${page}`, { method: 'POST' });
      const j = await r.json();
      document.getElementById(`status${page}`).textContent = `Started N=${j.started} on both lanes…`;
    });
    document.getElementById(`reset${page}`).addEventListener('click', async () => {
      await fetch(`/api/reset/${page}`, { method: 'POST' });
      resetLatch(page);
      document.getElementById(`status${page}`).textContent = `Reset N=${N[page]}`;
    });
  }
  wireButtons('A');
  wireButtons('B');
})();
</script>
</body>
</html>
