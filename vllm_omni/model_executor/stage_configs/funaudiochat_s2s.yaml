stage_args:
  - stage_id: 0
    stage_type: llm
    runtime:
      devices: "0"
      max_batch_size: 1
    engine_args:
      model: FunAudioLLM/Fun-Audio-Chat-8B
      model_stage: s2s
      model_arch: FunAudioChatForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      trust_remote_code: true
      enable_prefix_caching: false
      gpu_memory_utilization: 0.55
      engine_output_type: latent
      max_model_len: 8192
      max_num_batched_tokens: 8192
      enforce_eager: true
      distributed_executor_backend: "mp"
      dtype: bfloat16
    final_output: true
    final_output_type: text
    is_comprehension: true
    default_sampling_params:
      temperature: 0.8
      top_p: 0.9
      top_k: 0
      repetition_penalty: 1.2
      max_tokens: 2048
      stop_token_ids: [151645]
      detokenize: true
      seed: 42

  - stage_id: 1
    stage_type: llm
    runtime:
      devices: "0"
      max_batch_size: 1
    engine_args:
      model: FunAudioLLM/Fun-CosyVoice3-0.5B-2512
      model_stage: code2wav
      model_arch: FunAudioChatCosyVoice3Code2Wav
      worker_type: generation
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      trust_remote_code: true
      enable_prefix_caching: false
      gpu_memory_utilization: 0.25
      engine_output_type: audio
      max_model_len: 32768
      max_num_batched_tokens: 32768
      skip_tokenizer_init: true
      enforce_eager: true
      distributed_executor_backend: "mp"
      dtype: bfloat16
    engine_input_source: [0]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.funaudiochat.funaudiochat2code2wav
    final_output: true
    final_output_type: audio
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 1
      detokenize: true
      seed: 42
