# Profiled version of fish_speech_s2_pro.yaml.
# Use /start_profile and /stop_profile endpoints to capture traces.
async_chunk: true
stage_args:
  - stage_id: 0
    stage_type: llm
    is_comprehension: true
    runtime:
      devices: "0"
      max_batch_size: 16
    engine_args:
      max_num_seqs: 8
      model_stage: fish_speech_slow_ar
      model_arch: FishSpeechSlowARForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      enforce_eager: false
      trust_remote_code: true
      async_scheduling: false
      enable_prefix_caching: false
      engine_output_type: latent
      gpu_memory_utilization: 0.6
      distributed_executor_backend: "mp"
      max_num_batched_tokens: 3072
      max_model_len: 16384
      custom_process_next_stage_input_func: vllm_omni.model_executor.stage_input_processors.fish_speech.slow_ar_to_dac_decoder_async_chunk
      profiler_config:
        profiler: torch
        torch_profiler_dir: /tmp/fish_perf_profile
        torch_profiler_with_stack: true
        torch_profiler_with_flops: false
        torch_profiler_use_gzip: true
        torch_profiler_dump_cuda_time_total: true
        torch_profiler_record_shapes: false
        torch_profiler_with_memory: false
        ignore_frontend: false
        delay_iterations: 0
        max_iterations: 0
    output_connectors:
      to_stage_1: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.8
      top_k: 30
      top_p: 0.9
      max_tokens: 2048
      seed: 42
      detokenize: false
      repetition_penalty: 1.0
      stop_token_ids: [151645]

  - stage_id: 1
    stage_type: llm
    runtime:
      devices: "0"
      max_batch_size: 16
    engine_args:
      max_num_seqs: 8
      model_stage: dac_decoder
      model_arch: FishSpeechDACDecoder
      worker_type: generation
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      enforce_eager: true
      trust_remote_code: true
      async_scheduling: false
      enable_prefix_caching: false
      engine_output_type: audio
      gpu_memory_utilization: 0.1
      distributed_executor_backend: "mp"
      max_num_batched_tokens: 8192
      max_model_len: 16384
      profiler_config:
        profiler: torch
        torch_profiler_dir: /tmp/fish_perf_profile
        torch_profiler_with_stack: true
        torch_profiler_with_flops: false
        torch_profiler_use_gzip: true
        torch_profiler_dump_cuda_time_total: true
        torch_profiler_record_shapes: false
        torch_profiler_with_memory: false
        ignore_frontend: false
        delay_iterations: 0
        max_iterations: 0
    engine_input_source: [0]
    final_output: true
    final_output_type: audio
    input_connectors:
      from_stage_0: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 65536
      seed: 42
      detokenize: true
      repetition_penalty: 1.0

runtime:
  enabled: true
  defaults:
    window_size: -1
    max_inflight: 16

  connectors:
    connector_of_shared_memory:
      name: SharedMemoryConnector
      extra:
        shm_threshold_bytes: 65536
        codec_streaming: true
        connector_get_sleep_s: 0.01
        connector_get_max_wait_first_chunk: 3000
        connector_get_max_wait: 300
        codec_chunk_frames: 25
        codec_left_context_frames: 25
        initial_codec_chunk_frames: 4

  edges:
    - from: 0
      to: 1
      window_size: -1
