# 4-GPU MiniCPM-o-4.5 config for H20/A100-class GPUs.
# Layout after CUDA_VISIBLE_DEVICES=<llm_gpu>,<tts_gpu0>,<tts_gpu1>,<tts_gpu2>:
#   Stage 0 (llm): logical GPU 0
#   Stage 1 (tts + Token2wav): three replicas on logical GPU 1, 2, and 3
#
# This targets concurrent text+audio throughput. It is not meant for 24GB
# cards where the MiniCPM-o thinker may need tensor parallelism.
session_mode: duplex

stage_args:
  - stage_id: 0
    runtime:
      process: true
      devices: "0"
      max_batch_size: 1
    engine_args:
      model_stage: llm
      model_arch: MiniCPMO45OmniForConditionalGeneration
      worker_cls: vllm_omni.worker.gpu_ar_worker.GPUARWorker
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      gpu_memory_utilization: 0.7
      enforce_eager: true
      trust_remote_code: true
      engine_output_type: latent
      enable_prefix_caching: false
      max_num_batched_tokens: 16384
      max_num_seqs: 1
      tensor_parallel_size: 1
      limit_mm_per_prompt:
        video: 1

    is_comprehension: true
    final_output: true
    final_output_type: text
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 2048
      seed: 42
      detokenize: True
      repetition_penalty: 1.1

  - stage_id: 1
    runtime:
      process: true
      devices: "1,2,3"
      num_replicas: 3
      max_batch_size: 1
    engine_args:
      model_stage: tts
      model_arch: MiniCPMO45OmniForConditionalGeneration
      worker_cls: vllm_omni.worker.gpu_ar_worker.GPUARWorker
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      gpu_memory_utilization: 0.75
      enforce_eager: true
      trust_remote_code: true
      enable_prefix_caching: false
      max_num_batched_tokens: 8192
      # MiniCPM-o 4.5 remote-code TTS generate asserts batch size 1 and
      # returns a whole waveform, not per-request sampled token ids. Keep each
      # replica single-sequence; horizontal replicas provide throughput.
      max_num_seqs: 1
      engine_output_type: audio
      hf_config_name: tts_config
    engine_input_source: [0]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.minicpmo_4_5_omni.llm2tts
    final_output: true
    final_output_type: audio
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 1
      extra_args:
        stop_token_names: ["<|im_end|>"]
      seed: 42
      detokenize: False

runtime:
  enabled: true
  defaults:
    window_size: -1
    max_inflight: 3

  edges:
    - from: 0
      to: 1
      window_size: -1
