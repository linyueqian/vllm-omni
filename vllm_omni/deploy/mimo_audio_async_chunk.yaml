# MiMo Audio async-chunk deploy: thinker+talker streams RVQ codes to
# code2wav via shared memory. Both stages share device 0. Select with
# ``--deploy-config vllm_omni/deploy/mimo_audio_async_chunk.yaml``.
async_chunk: true
dtype: bfloat16

connectors:
  connector_of_shared_memory:
    name: SharedMemoryConnector
    extra:
      shm_threshold_bytes: 365536
      codec_streaming: true
      connector_get_sleep_s: 0.001
      connector_get_max_wait_first_chunk: 3000
      connector_get_max_wait: 300
      codec_chunk_frames: 3
      codec_left_context_frames: 3

stages:
  - stage_id: 0
    max_num_seqs: 1
    gpu_memory_utilization: 0.3
    enforce_eager: true
    max_num_batched_tokens: 8192
    max_model_len: 8192
    devices: "0"
    output_connectors:
      to_stage_1: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.6
      top_p: 0.95
      top_k: 50
      max_tokens: 18192
      seed: 42
      repetition_penalty: 1.1

  - stage_id: 1
    max_num_seqs: 1
    gpu_memory_utilization: 0.2
    enforce_eager: true
    async_scheduling: false
    max_num_batched_tokens: 8192
    max_model_len: 8192
    devices: "0"
    input_connectors:
      from_stage_0: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 18192
      seed: 42
