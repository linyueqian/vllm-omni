# CosyVoice3 deploy: 2-stage talker → flow-matching code2wav (sync mode).
# Stage 1 runs text2flow over the full speech-token sequence once stage 0
# finishes; async-chunk streaming lives in cosyvoice3_async_chunk.yaml.
#
# enforce_eager=true everywhere:
#   * Stage 0 (talker) — legacy config ran eager; cudagraph not verified.
#   * Stage 1 (code2wav) — CUDA graphs don't work with dynamic conv shapes.
async_chunk: false
dtype: float32

stages:
  - stage_id: 0
    max_num_seqs: 1
    gpu_memory_utilization: 0.2
    enforce_eager: true
    devices: "0"
    default_sampling_params:
      max_tokens: 2048
      top_k: 25
      top_p: 0.8
      # near-identity repetition penalty forces vLLM to track
      # output_token_ids for RAS (stop-token logit logsumexp).
      repetition_penalty: 1.0001
    disable_hybrid_kv_cache_manager: true
    mm_processor_cache_gb: 0
    skip_mm_profiling: true

  - stage_id: 1
    max_num_seqs: 1
    gpu_memory_utilization: 0.1
    enforce_eager: true
    devices: "0"
    default_sampling_params:
      max_tokens: 2048
    disable_hybrid_kv_cache_manager: true
    skip_mm_profiling: true
